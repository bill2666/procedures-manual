# Procedures Manual — MkDocs Material Configuration
# Bill's Regulatory & Financial Analytics | Law Society of NSW

site_name: Procedures Manual
site_description: >-
  Workflows, code patterns, and hard-won lessons for regulatory
  and financial analytics at the Law Society of NSW.
site_url: https://YOURUSERNAME.github.io/procedures-manual/

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant         # XHR page loads (feels like SPA)
    - navigation.tracking        # URL updates as you scroll
    - navigation.tabs            # Top-level sections as tabs
    - navigation.sections        # Bold section headers in sidebar
    - navigation.expand          # Auto-expand sidebar sections
    - navigation.top             # Back-to-top button
    - search.suggest             # Search autocomplete
    - search.highlight           # Highlight matches on page
    - content.code.copy          # Copy button on code blocks
    - content.code.annotate      # Clickable code annotations
    - toc.follow                 # TOC follows scroll position
  icon:
    repo: fontawesome/brands/github

# Repository link (top-right corner)
repo_url: https://github.com/YOURUSERNAME/procedures-manual
repo_name: procedures-manual

# Extensions — these power the fancy features
markdown_extensions:
  # Admonitions (callout boxes)
  - admonition
  - pymdownx.details              # Collapsible admonitions
  - pymdownx.superfences:         # Nested content in admonitions + mermaid
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  # Code blocks
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite          # Inline code highlighting
  - pymdownx.snippets              # Include external files

  # Formatting
  - pymdownx.betterem              # Improved bold/italic handling
  - pymdownx.caret                 # ^^superscript^^
  - pymdownx.mark                  # ==highlight==
  - pymdownx.tilde                 # ~~strikethrough~~
  - pymdownx.keys                  # ++ctrl+alt+del++

  # Content tabs (e.g. VBA vs M vs DAX side by side)
  - pymdownx.tabbed:
      alternate_style: true

  # Tables
  - tables

  # Table of contents
  - toc:
      permalink: true              # Anchor links on headings
      toc_depth: 3

  # Task lists
  - pymdownx.tasklist:
      custom_checkbox: true

  # Emoji
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  # Attribute lists (for adding classes to elements)
  - attr_list
  - md_in_html

# Plugins
plugins:
  - search:
      separator: '[\s\-\.]+'      # Better search tokenisation

# Navigation structure
# This maps to the docs/ folder structure.
# Update this when adding new sections or pages.
nav:
  - Home: index.md
  - Outlook VBA:
    - outlook-vba/index.md
    - Quick Reply with First Name Greeting: outlook-vba/quick-reply-greeting.md
  - Excel VBA:
    - excel-vba/index.md
  - Power Query — M:
    - power-query/index.md

# Extra CSS (optional, for minor tweaks)
extra_css:
  - stylesheets/extra.css

# Footer
extra:
  generator: false                 # Hide "Made with MkDocs Material" footer
